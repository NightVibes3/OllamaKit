name: Build Unsigned IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_MAJOR: "26"
  IOS_DEPLOYMENT_TARGET: "26.0"
  LLAMA_CPP_TAG: "b8548"
  CONFIGURATION: ${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode Version
      run: |
        set -eo pipefail
        shopt -s nullglob

        candidates=(/Applications/Xcode_${XCODE_MAJOR}*.app)
        if [ -d /Applications/Xcode.app ]; then
          candidates+=(/Applications/Xcode.app)
        fi

        if [ "${#candidates[@]}" -eq 0 ]; then
          echo "No Xcode ${XCODE_MAJOR}.x installation found on this runner."
          ls -1 /Applications | grep Xcode || true
          exit 1
        fi

        IFS=$'\n' sorted_candidates=($(printf '%s\n' "${candidates[@]}" | sort -rV))
        unset IFS
        selected_xcode=""

        for xcode_app in "${sorted_candidates[@]}"; do
          developer_dir="$xcode_app/Contents/Developer"
          xcodebuild_bin="$developer_dir/usr/bin/xcodebuild"

          echo "=== Inspecting $xcode_app ==="
          "$xcodebuild_bin" -version
          "$xcodebuild_bin" -showsdks

          destinations="$(
            DEVELOPER_DIR="$developer_dir" \
            "$xcodebuild_bin" -project OllamaKit.xcodeproj -scheme OllamaKit -showdestinations 2>&1 || true
          )"
          echo "$destinations"

          if printf '%s' "$destinations" | grep -q "Any iOS Device" && ! printf '%s' "$destinations" | grep -q "error:iOS"; then
            selected_xcode="$xcode_app"
            break
          fi

          if printf '%s' "$destinations" | grep -q "error:iOS .* is not installed"; then
            echo "Attempting to install the iOS platform for $xcode_app"
            DEVELOPER_DIR="$developer_dir" "$xcodebuild_bin" -downloadPlatform iOS

            destinations="$(
              DEVELOPER_DIR="$developer_dir" \
              "$xcodebuild_bin" -project OllamaKit.xcodeproj -scheme OllamaKit -showdestinations 2>&1 || true
            )"
            echo "$destinations"

            if printf '%s' "$destinations" | grep -q "Any iOS Device" && ! printf '%s' "$destinations" | grep -q "error:iOS"; then
              selected_xcode="$xcode_app"
              break
            fi
          fi
        done

        if [ -z "$selected_xcode" ]; then
          echo "Failed to find an Xcode ${XCODE_MAJOR}.x installation with a usable iOS platform."
          exit 1
        fi

        echo "Using $selected_xcode"
        echo "DEVELOPER_DIR=$selected_xcode/Contents/Developer" >> "$GITHUB_ENV"
        "$selected_xcode/Contents/Developer/usr/bin/xcodebuild" -version
        "$selected_xcode/Contents/Developer/usr/bin/xcodebuild" -showsdks

    - name: Build llama.cpp XCFramework
      run: |
        set -eo pipefail
        rm -rf .deps Vendor/llama.xcframework
        mkdir -p .deps Vendor

        git clone --depth 1 --branch "${LLAMA_CPP_TAG}" https://github.com/ggml-org/llama.cpp.git .deps/llama.cpp

        bash Scripts/build-llama-ios-xcframework.sh "$PWD/.deps/llama.cpp" "$PWD/Vendor/llama.xcframework"

        echo "=== Built llama.xcframework ==="
        find Vendor/llama.xcframework -type f | sort | head -100

    - name: Build Archive
      run: |
        set -eo pipefail
        rm -rf build
        mkdir -p build

        xcodebuild archive \
          -project OllamaKit.xcodeproj \
          -scheme OllamaKit \
          -configuration ${{ env.CONFIGURATION }} \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath "build/OllamaKit.xcarchive" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_BITCODE=NO \
          SKIP_INSTALL=NO \
          COMPILER_INDEX_STORE_ENABLE=NO \
          IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS="arm64" \
          2>&1 | tee build/build.log
        
        echo "=== Build completed, checking results ==="
        ls -la build/
        
        if [ -d "build/OllamaKit.xcarchive" ]; then
          echo "=== Archive exists ==="
          ls -la build/OllamaKit.xcarchive/
          echo "=== Products ==="
          ls -la build/OllamaKit.xcarchive/Products/ 2>/dev/null || echo "No Products"
          echo "=== Applications ==="
          ls -la build/OllamaKit.xcarchive/Products/Applications/ 2>/dev/null || echo "No Applications"
          echo "=== Find all .app files ==="
          find build/OllamaKit.xcarchive -name "*.app" -type d 2>/dev/null
        else
          echo "=== No archive found, checking for other outputs ==="
          find build -type f 2>/dev/null | head -30
        fi

    - name: Create IPA (Unsigned)
      run: |
        echo "=== Creating IPA ==="
        
        # Find the .app file
        APP_PATH=$(find build/OllamaKit.xcarchive -name "*.app" -type d 2>/dev/null | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: Could not find .app file"
          echo "=== Full build directory ==="
          find build -type f 2>/dev/null | head -50
          exit 1
        fi

        echo "Found app at: $APP_PATH"
        ls -la "$APP_PATH"

        mkdir -p build/Payload
        cp -R "$APP_PATH" build/Payload/

        APP_NAME=$(basename "$APP_PATH")
        echo "App name: $APP_NAME"

        rm -rf "build/Payload/$APP_NAME/_CodeSignature" 2>/dev/null || true
        rm -rf "build/Payload/$APP_NAME/CodeResources" 2>/dev/null || true

        cd build
        zip -r "OllamaKit-unsigned.ipa" Payload
        cd ..

        echo "=== IPA created ==="
        ls -la build/OllamaKit-unsigned.ipa

        IPA_SIZE=$(stat -f%z build/OllamaKit-unsigned.ipa 2>/dev/null || stat -c%s build/OllamaKit-unsigned.ipa 2>/dev/null || echo "0")
        echo "IPA size: $IPA_SIZE bytes"

        if [ "$IPA_SIZE" -lt 1000 ]; then
          echo "ERROR: IPA file is too small"
          exit 1
        fi

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ env.CONFIGURATION }}
        path: build/build.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OllamaKit-unsigned-${{ env.CONFIGURATION }}
        path: build/OllamaKit-unsigned.ipa
        retention-days: 30

    - name: Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/OllamaKit-unsigned.ipa
        tag_name: v${{ github.run_number }}
        name: OllamaKit Build ${{ github.run_number }}
        body: |
          ## OllamaKit Unsigned IPA

          This is an unsigned IPA built from commit ${{ github.sha }}.

          ### Installation

          To install this IPA on your device, you need to sign it with your Apple ID:

          #### Option 1: Using AltStore
          1. Download the IPA
          2. Open AltStore on your device
          3. Go to My Apps → + button
          4. Select the downloaded IPA

          #### Option 2: Using Sideloadly
          1. Download and install Sideloadly on your computer
          2. Connect your device
          3. Drag the IPA to Sideloadly
          4. Enter your Apple ID
          5. Click Start

          #### Option 3: Using TrollStore (if supported)
          1. Install TrollStore on your device
          2. Download the IPA
          3. Share to TrollStore

          ### Requirements
          - iOS 26.0 or later
          - iPhone or iPad with A12 chip or newer

          ### Configuration
          - Default API Server Port: 11434
          - Access the API at `http://127.0.0.1:11434`

          ### Features
          - Real on-device GGUF inference powered by llama.cpp
          - Browse and download GGUF models from Hugging Face
          - Local chat UI with Markdown rendering
          - Ollama-style API routes plus OpenAI-compatible `/v1` model/chat/completion routes
          - Best-effort background server wakeups
          - Unsigned real-device IPA for sideload signing

          ### Build Info
          - Configuration: ${{ env.CONFIGURATION }}
          - Xcode Family: ${{ env.XCODE_MAJOR }}.x
          - llama.cpp Tag: ${{ env.LLAMA_CPP_TAG }}
          - Build Date: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
