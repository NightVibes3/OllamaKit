name: Build Unsigned IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_MAJOR: "26"
  IOS_DEPLOYMENT_TARGET: "26.0"
  LLAMA_CPP_TAG: "b8548"
  CONFIGURATION: ${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode Version
      run: |
        set -eo pipefail
        shopt -s nullglob

        candidates=(/Applications/Xcode_${XCODE_MAJOR}*.app)
        if [ -d /Applications/Xcode.app ]; then
          candidates+=(/Applications/Xcode.app)
        fi

        if [ "${#candidates[@]}" -eq 0 ]; then
          echo "No Xcode ${XCODE_MAJOR}.x installation found on this runner."
          ls -1 /Applications | grep Xcode || true
          exit 1
        fi

        IFS=$'\n' sorted_candidates=($(printf '%s\n' "${candidates[@]}" | python3 -c "import re,sys; key=lambda value: [int(part) if part.isdigit() else part.lower() for part in re.split(r'(\\d+)', value.strip())]; values=[line.strip() for line in sys.stdin if line.strip()]; print('\\n'.join(sorted(values, key=key, reverse=True)))"))
        unset IFS
        selected_xcode=""

        for xcode_app in "${sorted_candidates[@]}"; do
          developer_dir="$xcode_app/Contents/Developer"
          xcodebuild_bin="$developer_dir/usr/bin/xcodebuild"

          echo "=== Inspecting $xcode_app ==="
          "$xcodebuild_bin" -version
          sdks="$("$xcodebuild_bin" -showsdks)"
          echo "$sdks"

          if printf '%s' "$sdks" | grep -q "iphoneos"; then
            selected_xcode="$xcode_app"
            break
          fi
        done

        if [ -z "$selected_xcode" ]; then
          echo "Failed to find an Xcode ${XCODE_MAJOR}.x installation with an iphoneos SDK."
          exit 1
        fi

        echo "Using $selected_xcode"
        sudo xcode-select -s "$selected_xcode/Contents/Developer"
        echo "DEVELOPER_DIR=$selected_xcode/Contents/Developer" >> "$GITHUB_ENV"
        sudo "$selected_xcode/Contents/Developer/usr/bin/xcodebuild" -runFirstLaunch
        "$selected_xcode/Contents/Developer/usr/bin/xcodebuild" -version
        "$selected_xcode/Contents/Developer/usr/bin/xcodebuild" -showsdks

    - name: Verify iPhoneOS SDK
      run: |
        set -eo pipefail
        sudo xcode-select -s "$DEVELOPER_DIR"
        xcodebuild -showsdks
        xcodebuild -sdk iphoneos -version SDKVersion
        simulator_sdk_version="$(xcodebuild -sdk iphonesimulator -version SDKVersion)"
        matching_runtime=""

        for attempt in 1 2 3; do
          echo "Refreshing iOS platform components (attempt $attempt)..."
          if sudo xcodebuild -downloadPlatform iOS; then
            echo "Platform refresh completed."
          else
            echo "Platform refresh attempt $attempt failed."
          fi

          runtime_output="$(xcrun simctl runtime list 2>&1 || true)"
          printf '%s\n' "$runtime_output"

          matching_runtime="$(printf '%s\n' "$runtime_output" | grep -F "iOS ${simulator_sdk_version} " | head -1 || true)"
          if [ -n "$matching_runtime" ]; then
            echo "Found matching iOS simulator runtime: $matching_runtime"
            break
          fi

          if [ "$attempt" -lt 3 ]; then
            sleep 15
          fi
        done

        if [ -z "$matching_runtime" ]; then
          echo "No installed iOS simulator runtime matches SDK version ${simulator_sdk_version}."
          exit 1
        fi

    - name: Build llama.cpp XCFramework
      run: |
        set -eo pipefail
        rm -rf .deps Vendor/llama.xcframework
        mkdir -p .deps Vendor

        git clone --depth 1 --branch "${LLAMA_CPP_TAG}" https://github.com/ggml-org/llama.cpp.git .deps/llama.cpp

        bash Scripts/build-llama-ios-xcframework.sh "$PWD/.deps/llama.cpp" "$PWD/Vendor/llama.xcframework"

        echo "=== Built llama.xcframework ==="
        find Vendor/llama.xcframework -type f | sort | head -100

    - name: Verify Agent Workspace Seed
      run: |
        set -eo pipefail
        python3 Scripts/generate-agent-workspace-seed.py --check

    - name: Run Relay Tests
      run: |
        set -eo pipefail
        npm --prefix Relay test

    - name: Run Package Tests
      run: |
        set -eo pipefail
        SKIP_OLLAMAKIT_PACKAGE_TARGET=1 swift test

    - name: Build Variant Archives
      run: |
        set -eo pipefail
        rm -rf build
        mkdir -p build/logs build/ipas

        build_variant() {
          local variant="$1"
          local swift_flag="$2"
          local bundle_id="$3"
          local product_name="$4"
          local archive_dir="build/${variant}"
          local archive_path="${archive_dir}/OllamaKit.xcarchive"
          local build_log="build/logs/${variant}.log"
          local ipa_path="build/ipas/OllamaKit-${variant}-unsigned.ipa"

          rm -rf "$archive_dir" build/Payload
          mkdir -p "$archive_dir" build/Payload

          xcodebuild archive \
            -project OllamaKit.xcodeproj \
            -scheme OllamaKit \
            -configuration ${{ env.CONFIGURATION }} \
            -sdk iphoneos \
            -archivePath "$archive_path" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            VALIDATE_PRODUCT=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            OLLAMAKIT_BUILD_VARIANT="$variant" \
            OTHER_SWIFT_FLAGS="\$(inherited) ${swift_flag}" \
            PRODUCT_BUNDLE_IDENTIFIER="$bundle_id" \
            PRODUCT_NAME="$product_name" \
            2>&1 | tee "$build_log"

          APP_PATH=$(find "$archive_path" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find .app file for variant ${variant}"
            find "$archive_dir" -type f 2>/dev/null | head -50
            exit 1
          fi

          cp -R "$APP_PATH" build/Payload/
          APP_NAME=$(basename "$APP_PATH")
          rm -rf "build/Payload/$APP_NAME/_CodeSignature" 2>/dev/null || true
          rm -rf "build/Payload/$APP_NAME/CodeResources" 2>/dev/null || true

          (
            cd build
            zip -qr "$(basename "$ipa_path")" Payload
          )
          mv "build/$(basename "$ipa_path")" "$ipa_path"
          rm -rf build/Payload

          IPA_SIZE=$(stat -f%z "$ipa_path" 2>/dev/null || stat -c%s "$ipa_path" 2>/dev/null || echo "0")
          echo "=== ${variant} IPA created ==="
          ls -la "$ipa_path"
          echo "IPA size: $IPA_SIZE bytes"

          if [ "$IPA_SIZE" -lt 1000 ]; then
            echo "ERROR: IPA file for ${variant} is too small"
            exit 1
          fi
        }

        build_variant "stockSideload" "-D OLLAMAKIT_VARIANT_STOCK_SIDELOAD" "com.ollamakit.app" "OllamaKit"
        build_variant "jailbreak" "-D OLLAMAKIT_VARIANT_JAILBREAK" "com.ollamakit.app.jailbreak" "OllamaKitJailbreak"

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ env.CONFIGURATION }}
        path: build/logs
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OllamaKit-unsigned-${{ env.CONFIGURATION }}
        path: build/ipas
        retention-days: 30

    - name: Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/ipas/OllamaKit-stockSideload-unsigned.ipa
          build/ipas/OllamaKit-jailbreak-unsigned.ipa
        tag_name: v${{ github.run_number }}
        name: OllamaKit Build ${{ github.run_number }}
        body: |
          ## OllamaKit Unsigned IPAs

          These are unsigned IPAs built from commit ${{ github.sha }}.

          ### Installation

          To install this IPA on your device, you need to sign it with your Apple ID:

          #### Option 1: Using AltStore
          1. Download the IPA
          2. Open AltStore on your device
          3. Go to My Apps → + button
          4. Select the downloaded IPA

          #### Option 2: Using Sideloadly
          1. Download and install Sideloadly on your computer
          2. Connect your device
          3. Drag the IPA to Sideloadly
          4. Enter your Apple ID
          5. Click Start

          #### Option 3: Using TrollStore (if supported)
          1. Install TrollStore on your device
          2. Download the IPA
          3. Share to TrollStore

          ### Requirements
          - iOS 26.0 or later
          - iPhone or iPad with A12 chip or newer

          ### Configuration
          - Default API Server Port: 11434
          - Access the API at `http://127.0.0.1:11434`

          ### Features
          - Real on-device GGUF inference powered by llama.cpp
          - Browse and download GGUF models from Hugging Face
          - Local chat UI with Markdown rendering
          - Ollama-style API routes plus OpenAI-compatible `/v1` model/chat/completion routes
          - Two release variants: stock sideload and jailbreak
          - Best-effort background server wakeups
          - Unsigned real-device IPA for sideload signing

          ### Build Info
          - Configuration: ${{ env.CONFIGURATION }}
          - Xcode Family: ${{ env.XCODE_MAJOR }}.x
          - llama.cpp Tag: ${{ env.LLAMA_CPP_TAG }}
          - Build Date: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
