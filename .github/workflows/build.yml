name: Build Unsigned IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_VERSION: "16.0"
  CONFIGURATION: ${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }}

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
        xcodebuild -version

    - name: Build Archive
      run: |
        rm -rf build
        mkdir -p build

        xcodebuild archive \
          -project OllamaKit.xcodeproj \
          -scheme OllamaKit \
          -configuration ${{ env.CONFIGURATION }} \
          -sdk iphoneos \
          -archivePath "build/OllamaKit.xcarchive" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_BITCODE=NO \
          IPHONEOS_DEPLOYMENT_TARGET=17.0 \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS="arm64" \
          | tee build/build.log

        echo "=== Build directory contents ==="
        ls -la build/

        echo "=== Archive contents (detailed) ==="
        if [ -d "build/OllamaKit.xcarchive" ]; then
          echo "Archive exists at build/OllamaKit.xcarchive"
          find build/OllamaKit.xcarchive -type f | head -30
          echo "=== Products directory ==="
          ls -la build/OllamaKit.xcarchive/Products/ 2>/dev/null || echo "No Products dir"
          echo "=== Applications directory ==="
          ls -la build/OllamaKit.xcarchive/Products/Applications/ 2>/dev/null || echo "No Applications dir"
        else
          echo "Archive not found at expected location"
          find build -type d -name "*.xcarchive" 2>/dev/null
        fi

    - name: Create IPA (Unsigned)
      run: |
        echo "=== Looking for .app in archive ==="
        
        # Try multiple locations for the .app
        APP_PATH=""
        
        # Location 1: Standard archive location
        if [ -d "build/OllamaKit.xcarchive/Products/Applications" ]; then
          APP_PATH=$(find build/OllamaKit.xcarchive/Products/Applications -name "*.app" -type d | head -1)
        fi
        
        # Location 2: Anywhere in the archive
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find build/OllamaKit.xcarchive -name "*.app" -type d | head -1)
        fi
        
        # Location 3: Check if archive was created with different name
        if [ -z "$APP_PATH" ]; then
          ARCHIVE=$(find build -name "*.xcarchive" -type d | head -1)
          if [ -n "$ARCHIVE" ]; then
            echo "Found archive at: $ARCHIVE"
            APP_PATH=$(find "$ARCHIVE" -name "*.app" -type d | head -1)
          fi
        fi

        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find .app file in archive"
          echo "=== Full archive structure ==="
          find build -type f 2>/dev/null | head -100
          exit 1
        fi

        echo "Found app at: $APP_PATH"
        ls -la "$APP_PATH"

        mkdir -p build/Payload
        cp -R "$APP_PATH" build/Payload/

        APP_NAME=$(basename "$APP_PATH")
        echo "App name: $APP_NAME"

        rm -rf "build/Payload/$APP_NAME/_CodeSignature" 2>/dev/null || true
        rm -rf "build/Payload/$APP_NAME/CodeResources" 2>/dev/null || true

        cd build
        zip -r "OllamaKit-unsigned.ipa" Payload
        cd ..

        echo "=== IPA Info ==="
        ls -la build/OllamaKit-unsigned.ipa

        IPA_SIZE=$(stat -f%z build/OllamaKit-unsigned.ipa 2>/dev/null || stat -c%s build/OllamaKit-unsigned.ipa 2>/dev/null || echo "0")
        echo "IPA size: $IPA_SIZE bytes"

        if [ "$IPA_SIZE" -lt 1000 ]; then
          echo "Error: IPA file is too small - build likely failed"
          exit 1
        fi

        echo "IPA contents:"
        unzip -l build/OllamaKit-unsigned.ipa | head -30

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OllamaKit-unsigned-${{ env.CONFIGURATION }}
        path: build/OllamaKit-unsigned.ipa
        retention-days: 30

    - name: Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/OllamaKit-unsigned.ipa
        tag_name: v${{ github.run_number }}
        name: OllamaKit Build ${{ github.run_number }}
        body: |
          ## OllamaKit Unsigned IPA

          This is an unsigned IPA built from commit ${{ github.sha }}.

          ### Installation

          To install this IPA on your device, you need to sign it with your Apple ID:

          #### Option 1: Using AltStore
          1. Download the IPA
          2. Open AltStore on your device
          3. Go to My Apps → + button
          4. Select the downloaded IPA

          #### Option 2: Using Sideloadly
          1. Download and install Sideloadly on your computer
          2. Connect your device
          3. Drag the IPA to Sideloadly
          4. Enter your Apple ID
          5. Click Start

          #### Option 3: Using TrollStore (if supported)
          1. Install TrollStore on your device
          2. Download the IPA
          3. Share to TrollStore

          ### Requirements
          - iOS 17.0 or later
          - iPhone or iPad with A12 chip or newer

          ### Configuration
          - Default API Server Port: 11434
          - Access the API at `http://127.0.0.1:11434`

          ### Features
          - Run local LLMs using GGUF models
          - Download models from Hugging Face
          - OpenAI-compatible API server
          - Background server mode
          - Chat interface with markdown support

          ### Build Info
          - Configuration: ${{ env.CONFIGURATION }}
          - Xcode Version: ${{ env.XCODE_VERSION }}
          - Build Date: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-simulator:
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
        xcodebuild -version

    - name: Build for Simulator
      run: |
        rm -rf build-simulator
        mkdir -p build-simulator

        xcodebuild build \
          -project OllamaKit.xcodeproj \
          -scheme OllamaKit \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | tee build-simulator/build.log

        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OllamaKit.app" -path "*iphonesimulator*" -type d 2>/dev/null | head -1)

        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OllamaKit.app" -type d 2>/dev/null | head -1)
        fi

        if [ -n "$APP_PATH" ]; then
          mkdir -p build-simulator/output
          cp -R "$APP_PATH" build-simulator/output/
          echo "Found and copied simulator app from: $APP_PATH"
        else
          echo "Warning: Could not find simulator app"
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -10 || true
          exit 1
        fi

    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: OllamaKit-simulator
        path: build-simulator/output/OllamaKit.app
        retention-days: 7
