PBXEOF
        
    - name: Build for Simulator
      run: |
        rm -rf build-simulator
        mkdir -p build-simulator
        
        xcodebuild build \
          -project OllamaKit.xcodeproj \
          -scheme OllamaKit \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | tee build-simulator/build.log | xcpretty || true
        
        # Find the app in DerivedData
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OllamaKit.app" -path "*iphonesimulator*" -type d 2>/dev/null | head -1)
        
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OllamaKit.app" -type d 2>/dev/null | head -1)
        fi
        
        if [ -n "$APP_PATH" ]; then
          cp -R "$APP_PATH" build-simulator/
          echo "Found and copied simulator app from: $APP_PATH"
        else
          echo "Warning: Could not find simulator app"
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -10 || true
        fi
        
    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: OllamaKit-simulator
        path: build-simulator/OllamaKit.app
        retention-days: 7
        if-no-files-found: warn
