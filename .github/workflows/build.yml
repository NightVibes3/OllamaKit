name: Build Unsigned IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_VERSION: "16.0"
  CONFIGURATION: ${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }}

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      packages: write
      actions: read
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
        xcodebuild -version
        swift --version
        
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Create Xcode Project
      run: |
        # This project needs an Xcode project to build properly as an iOS app
        # Create a minimal Xcode project structure
        echo "Creating Xcode project for iOS app..."
        
        # Create project directories
        mkdir -p OllamaKit.xcodeproj
        
        # Create the project.pbxproj file
        cat > OllamaKit.xcodeproj/project.pbxproj << 'PBXEOF'
